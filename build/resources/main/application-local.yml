spring:
  datasource:
    # FIXED: Property name is reWriteBatchedStatements
    url: jdbc:postgresql://localhost:5432/assignment_db?reWriteBatchedStatements=true
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      # Recommended for large pools to prevent application hangs
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000