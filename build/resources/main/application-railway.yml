spring:
  datasource:
    # Use reWriteBatchedStatements for performance (reWriteBatchedInserts is not a valid PG property)
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?reWriteBatchedStatements=true
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

    # Hikari settings must be nested under datasource for proper auto-configuration
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000