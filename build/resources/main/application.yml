spring:
  profiles:
    active: local
  application:
    name: delta-ingestion-service
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc.batch_size: 1000
        order_inserts: true
        # Dialect is automatically detected in Spring Boot 3.2.2+

#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password: "password"

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: public
    schemas: public
    clean-disabled: false

server:
  port: 8080

# Redisson specific settings
#redisson:
#  singleServerConfig:
#    address: "redis://127.0.0.1:6379"
#    password: "password"
redisson:
  config: |
    singleServerConfig:
      address: "redis://127.0.0.1:6379"
      connectionMinimumIdleSize: 5
      connectionPoolSize: 10

# Metrics & Monitoring Configuration
management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true

logging:
  level:
    com.delta.ingestion: DEBUG