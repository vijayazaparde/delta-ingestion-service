spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?reWriteBatchedStatements=true
    username: ${DB_USER}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

server:
  port: ${PORT:8080}

redisson:
  config: |
    singleServerConfig:
      address: "${REDIS_URL}"
      connectionMinimumIdleSize: 5
      connectionPoolSize: 10

logging:
  level:
    com.delta.ingestion: INFO