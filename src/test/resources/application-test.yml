spring:
  main:
    allow-bean-definition-overriding: true

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false

  data:
    redis:
      host: localhost
      port: 6379
      password: "password"

redisson:
  single-server-config:
    address: "redis://127.0.0.1:6379"
    password: "password"